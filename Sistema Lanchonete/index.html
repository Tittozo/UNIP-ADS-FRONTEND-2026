<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, inital-scale=1.0">
        <title>TESTE DESENVOLVIMENTO WEB2</title>
        <style>
            .container{
                display: grid;
                grid-template-columns: 200px 1fr;
                grid-template-rows: 80px 300px 80px;
                gap: 10px;
            }
            
            .header{
                grid-column: 1/3;
                background-color: blue;
                text-align: center;
                color: white;
            }
            
            .menu{
                background-color:lightgray;
                text-align: center;
            }
            
            .content{
                background-color:red;
            }
            
            .footer{
                grid-column: 1/3;
                background-color: grey;
            }
            h1 {
                text-align: center;
            }
        </style>
        <body>
        <h1>CARDÁPIO DE LANCHES</h1>
        <div class="container">
            <div class="header">
                <h2>PROMOÇÃO DO DIAS DAS MÃES</h2>
            </div>
            <div class="menu">Menu
                <ol type="I">
                    <li>🍔Lanches</li>
                    <li>🥤Bebidas</li>
                    <li>🍦Sobremesas</li>
                    <li>Salgados</li>
                    <li>Drinks</li>
                    <li>Acompanhamento</li>
                </ol>
            </div>
            <div class="content">Content</div>
            <div class="footer">Footer</div>
        </div>
        </body>
    </head>
</html>
