<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinais & Foco | Flashcards Interativos</title>
    <style>
        /* 1. Reset e Variáveis de Cores (Tema Educacional e Amigável) */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', 'Segoe UI', sans-serif;
        }

        :root {
            --bg-color: #f4f7f6;
            --primary-color: #6b46c1; /* Roxo vibrante para foco */
            --secondary-color: #f6ad55; /* Laranja suave para botões */
            --card-bg: #ffffff;
            --text-dark: #2d3748;
            --text-light: #ffffff;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 2. Cabeçalho e Título */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: fadeInDown 1s ease;
        }

        .header h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: #718096;
            font-size: 1.1rem;
        }

        /* 3. Container do Cartão 3D */
        .card-container {
            perspective: 1000px; /* Cria a perspectiva para o efeito 3D */
            width: 320px;
            height: 400px;
            margin-bottom: 2rem;
            cursor: pointer;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Animação com um leve "quique" */
            transform-style: preserve-3d; /* Mantém os lados no espaço 3D */
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-radius: 20px;
        }

        /* Classe ativada via JavaScript para virar o cartão */
        .card.is-flipped {
            transform: rotateY(180deg);
        }

        /* Lados do Cartão */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Esconde o lado de trás quando não está virado */
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        /* Lado da Frente (Palavra em Português) */
        .card-front {
            background-color: var(--card-bg);
            border: 2px solid #e2e8f0;
        }

        .card-front .icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .card-front h2 {
            font-size: 2rem;
            color: var(--text-dark);
        }

        .card-front p {
            margin-top: 1rem;
            font-size: 0.9rem;
            color: #a0aec0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Lado de Trás (Sinal/Tradução) */
        .card-back {
            background-color: var(--primary-color);
            color: var(--text-light);
            transform: rotateY(180deg); /* Já começa virado 180 graus de costas */
        }

        .card-back .sign-image {
            width: 150px;
            height: 150px;
            background-color: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
            margin-bottom: 1.5rem;
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.1);
        }

        .card-back h3 {
            font-size: 1.5rem;
            font-weight: 300;
        }

        /* 4. Controles (Botões Próximo/Anterior) */
        .controls {
            display: flex;
            gap: 1rem;
        }

            background-color: var(--secondary-color);
            color: var(--text-light);
            border: none;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
