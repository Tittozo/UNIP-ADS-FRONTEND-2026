<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TESTE DE DESENVOLVIMENTO WEB</title>
        <style>
            .container {
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-rows: 100px 100px;
                gap: 10px; 
                row-gap: 10px;
                column-gap:10px;
                margin-bottom: 20px;
            }
            .item1, .item2 {
                background-color: grey;
                border: 1px solid black;
                padding: 1rem;
                font-family: Arial, sans-serif;
                color: black;
                text-align: center;
                grid-row: 1/3;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <div class="item1">Item 1</div>
            <div class="item1">Item 2</div>
            <div class="item1">Item 3</div>
            <div class="item1">Item 4</div>
            <div class="item1">Item 5</div>
            <div class="item1">Item 6</div>
        </div>

        <div class="container">
            <div class="item2">Referencia 1</div>
            <div class="item2">Referencia 2</div>
            <div class="item2">Referencia 3</div>
            <div class="item2">Referencia 4</div>
        </div>
    </body>
</html>
